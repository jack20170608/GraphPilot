server:
  port: 8080

spring:
  application:
    name: graphpilot-scheduler

graphpilot:
  scheduler:
    scanner:
      enabled: true
      limit: 20
      interval-ms: 10000
  worker:
    dispatch:
      mode: local              # local 或 remote
      remote:
        base-url: http://localhost:8081
        timeout-ms: 90000

logging:
  level:
    com.graphpilot: INFO