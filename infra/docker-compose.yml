services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: graphpilot
      POSTGRES_USER: graphpilot
      POSTGRES_PASSWORD: graphpilot
    ports:
      - "5432:5432"
    volumes:
      - graphpilot-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  graphpilot-postgres-data:
